<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<head>

    <meta th:replace="~{_res/inc/header}">
    <script th:inline="javascript">
        /*<![CDATA[*/
        $(document).ready(function () {


            $(".termwrapper").sortable({
                helper: 'clone'
            });
            //submit add or edit form
            $(".submit_btn").button().click(function () {
                filterTerms();
            });


            $(".clear_btn").button().click(function () {
                $('#filter').val('');
                filterTerms();
            });

            //lines rendered per <pre> block - large sessions would hang the browser with one node per line
            var RENDER_BATCH = 5000;
            var termState = {};

            function schedule(st) {
                if (!st.scheduled) {
                    st.scheduled = true;
                    setTimeout(function () {
                        st.scheduled = false;
                        renderPending(st);
                    }, 0);
                }
            }

            function renderPending(st) {
                var filterVal = $('#filter').val();
                var batch = st.pending.splice(0, RENDER_BATCH);
                var visible = filterVal ? batch.filter(function (line) {
                    return line.indexOf(filterVal) >= 0;
                }) : batch;
                if (visible.length > 0) {
                    st.terminal.append($("<pre></pre>").text(visible.join('\n') || ' '));
                }
                if (st.pending.length > 0) {
                    schedule(st);
                }
            }

            function filterTerms() {
                $.each(termState, function (id, st) {
                    st.terminal.empty();
                    st.pending = st.lines.slice();
                    schedule(st);
                });
            }

            function streamTerm(st) {
                fetch('streamTermOutputForSession.ktrl?sessionId=' + [[${sessionAudit.id}]] + '&instanceId=' + st.id + '&t=' + new Date().getTime() + '&_csrf=' + [[${session._csrf}]],
                    {credentials: 'same-origin'})
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error('HTTP ' + response.status);
                        }
                        var reader = response.body.getReader();
                        var decoder = new TextDecoder();
                        var carry = '';

                        function addText(text, isLast) {
                            var parts = text.split('\n');
                            if (isLast) {
                                carry = '';
                                if (parts.length > 0 && parts[parts.length - 1] === '') {
                                    parts.pop();
                                }
                            } else {
                                carry = parts.pop();
                            }
                            if (parts.length > 0) {
                                Array.prototype.push.apply(st.lines, parts);
                                Array.prototype.push.apply(st.pending, parts);
                                schedule(st);
                            }
                        }

                        function pump() {
                            return reader.read().then(function (result) {
                                if (result.done) {
                                    addText(carry + decoder.decode(), true);
                                    return;
                                }
                                addText(carry + decoder.decode(result.value, {stream: true}), false);
                                return pump();
                            });
                        }

                        return pump();
                    })
                    .catch(function () {
                        st.terminal.append($("<pre></pre>").text('Error - could not load session output'));
                    });
            }

            $(".output").each(function () {
                var id = $(this).attr("id").replace("output_", "");
                termState[id] = {
                    id: id,
                    terminal: $(this).children(".terminal"),
                    lines: [],
                    pending: [],
                    scheduled: false
                };
                streamTerm(termState[id]);
            });

        });
        /*]]>*/
    </script>
    <style>
            .run_cmd {
                width: 45%
            }
            .term {
                background-color: #000;
            }
            .terminal {
                height: 300px;
                overflow-y: scroll;
            }
            .terminal pre {
                padding: 0 2px;
                margin: 0;
                white-space: pre-wrap;
                word-wrap: break-word;
                color: #f0f0f0;
            }
            .align-right {
                padding: 10px 2px 10px 10px;
                float: right;
            }
            .term-container {
                width: 100%;
                padding: 25px 0;
                margin: 0;
            }
            /* bastillion.css sets 145% for the live-terminals workspace; the audit view fits the page */
            div.termwrapper {
                width: 100%;
                margin: 0;
            }
        </style>
    <title>Bastillion - Session Terminals</title>
</head>

<body>
<div class="navbar navbar-dark bg-dark fixed-top navbar-expand" role="navigation">
    <div class="container">
        <div class="navbar-brand">
            <div class="nav-img">
                <img src="/img/bastillion_40x40.png" th:src="@{/img/bastillion_40x40.png}"
                     alt="bastillion">
            </div>Bastillion</div>
        <div class="navbar-collapse" id="navbarCollapse">
            <template th:if="${pendingSystemStatus == null}" th:remove="tag">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a th:href="'viewSessions.ktrl?_csrf=' + ${session._csrf}" class="nav-link">Exit Audit</a>
                    </li>
                </ul>

                <ul class="navbar-nav mb-2 mb-lg-0" style="float:right">
                    <li class="nav-item">
                        <label> <b>Audit ( <span th:text="${sessionAudit.username}"></span>
                            <span th:if="${sessionAudit.lastNm != null}" th:text="' - ' + ${sessionAudit.lastNm} + ', ' + ${sessionAudit.firstNm}"></span> ) </b>
                        </label>
                    </li>
                    <li class="nav-item">&nbsp;&nbsp;&nbsp;&nbsp;</li>
                    <li class="nav-item">
                        <input type="text" id="filter" name="filter" title="Filter" class="spacer spacer-left form-control">
                    </li>
                    <li class="nav-item">&nbsp;</li>
                    <li class="nav-item">
                        <div class="btn btn-secondary submit_btn spacer spacer-middle">Filter</div>
                    </li>
                    <li class="nav-item">
                        <div class="btn btn-secondary clear_btn spacer spacer-right">Clear</div>
                    </li>
                </ul>
            </template>
        </div>
        <!--/.nav-collapse -->
    </div>
</div>
<div class="term-container container">
    <div class="termwrapper" th:if="${sessionAudit != null}">
        <template th:each=" s : ${sessionAudit.hostSystemList}" th:remove="tag">
            <div th:id="'run_cmd_' + ${s.instanceId}" class="run_cmd_active run_cmd">
                <h6 class="term-header" th:text="${s.displayLabel}"></h6>
                <div th:id="'term_' + ${s.instanceId}" class="term">
                    <div th:id="'output_' + ${s.instanceId}" class="output">
                        <div class="terminal"></div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
<div class="container" th:if="${sessionAudit == null || sessionAudit.hostSystemList.empty}">
    <div class="error">No terms are associated with this session (<a th:href="'../manage/viewSessions.ktrl?_csrf=' + ${session._csrf}">Audit Sessions</a>).</div>
</div>
</body>

</html>
